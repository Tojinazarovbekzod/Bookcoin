{%load static%}
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>BookCoin | My Books</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" href="{% static 'images/bookLogotip.jpg'%}">

</head>

<body class="bg-gray-950 text-white">

  <!-- HEADER -->
  <div class="max-w-7xl mx-auto p-6 flex justify-between items-center">
    <h1 class="text-2xl font-semibold">📖 My Books</h1>

    <span style="display: flex; gap: 20px;">
      <a href="{%url 'blog:studentDashboard'%}" class="bg-indigo-600 px-4 py-2 rounded-lg hover:bg-indigo-700">
        Dashboard
      </a>

      <a href="{%url 'blog:marketPlace'%}" class="bg-indigo-600 px-4 py-2 rounded-lg hover:bg-indigo-700">
        MarketPlace
      </a>

      <a href="{%url 'blog:catalog'%}" class="bg-indigo-600 px-4 py-2 rounded-lg hover:bg-indigo-700">
        Catalog
      </a>
    </span>
  </div>

  <!-- GRID -->
  <div class="max-w-7xl mx-auto px-6 pb-10">

    <div id="list" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
    </div>

  </div>

  <script src="{%static 'js/store.js'%}?v=2"></script>
  <script>
    function render() {
      const list = document.getElementById("list");
      const data = getBooks();

      list.innerHTML = "";

      if (data.length === 0) {
        list.innerHTML = `<p class="text-gray-400">No books yet 📭</p>`;
        return;
      }

      data.forEach((book, index) => {
        const div = document.createElement("div");

        div.className = `
        bg-gray-900 rounded-2xl overflow-hidden shadow hover:scale-105 transition
      `;

        div.innerHTML = `
        <img src="${book.img}" class="h-40 w-full object-cover">

        <div class="p-4">
          <h2 class="font-semibold">${book.title}</h2>
          <p class="text-gray-400 text-sm">${book.author}</p>

          <button class="mt-3 w-full bg-red-600 py-1 rounded hover:bg-red-700">
            Remove ❌
          </button>
        </div>
      `;

        // remove event
        div.querySelector("button").addEventListener("click", () => {
          removeBook(index);
          render();
        });

        list.appendChild(div);
      });
    }

    render();
  </script>




</body>

</html>
