{% load static%}
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BookCoin | Marketplace</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

  <!-- HEADER -->
  <header class="bg-black text-white flex justify-between items-center p-4 text-2xl font-bold">

    <div>
      📚 Book Marketplace
    </div>

    <a href="{% url 'blog:myBook' %}"
      class="text-sm bg-white text-black px-4 py-2 rounded-lg hover:bg-gray-200 transition">
      My Book 📖
    </a>

  </header>
  
  <!-- GRID -->
  <div id="grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6 p-6"></div>

 <script src="{%static 'js/store.js'%}?v=3"></script>

<script>

  const allBooks = Array.from({ length: 45 }).map((_, i) => ({
    title: "Applied Biometrics " + (i + 1),
    author: "Dr. Viktor Gray",
    price: (10 + i) + " BKC",
    img: "https://picsum.photos/300/400?random=" + i
  }));

  function render() {
    const grid = document.getElementById("grid");
    grid.innerHTML = "";

    allBooks.forEach((b, index) => {
      const div = document.createElement("div");

      div.className = `
        bg-white rounded-2xl shadow-lg overflow-hidden 
        hover:shadow-2xl hover:scale-[1.03] transition duration-300
      `;

      div.innerHTML = `
        <div class="relative">
          <img src="${b.img}" class="h-64 w-full object-cover">

          <span class="absolute bottom-3 left-3 bg-yellow-400 text-black px-3 py-1 rounded-full text-sm font-bold shadow">
            ${b.price}
          </span>
        </div>

        <div class="p-4">
          <h2 class="font-bold text-lg text-gray-800">${b.title}</h2>
          <p class="text-gray-500 text-sm">${b.author}</p>

          <button class="mt-3 w-full bg-black text-white py-2 rounded-xl hover:bg-gray-800 transition">
            Buy Now
          </button>
        </div>
      `;

      div.querySelector("button").addEventListener("click", () => {
        buyBook(b);
        window.location.href = "{%url 'blog:myBook'%}";
      });

      grid.appendChild(div);
    });
  }

  render();
</script>
</body>

</html>
