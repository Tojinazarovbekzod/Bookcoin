version: '3.8'

services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: ${DB_NAME:-bookcoin}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-admin12345}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-admin12345}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  web:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - DEBUG=True
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./media:/app/media
    restart: unless-stopped

volumes:
  mysql_data:
